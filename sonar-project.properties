sonar.organization=tomrussobuilds
sonar.projectKey=tomrussobuilds_orchard-ml
sonar.projectName=Orchard ML

sonar.sources=orchard
sonar.tests=tests

sonar.python.coverage.reportPaths=coverage.xml
sonar.python.version=3.10

sonar.coverage.exclusions=**/__init__.py,**/conftest.py,tests/**

# Suppress "unused parameter" (S1172) in detection adapters and fasterrcnn builder.
# These params are required by the Protocol contract but semantically unused
# by detection (e.g. criterion, mixup_fn, class_weights, class_names).
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=python:S1172
sonar.issue.ignore.multicriteria.e1.resourceKey=orchard/tasks/detection/**
