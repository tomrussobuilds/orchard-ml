name: Docker Build

on:
  push:
    branches: [main]
    paths:
      - 'docker/Dockerfile'
      - 'pyproject.toml'
  pull_request:
    branches: [main]
    paths:
      - 'docker/Dockerfile'
      - 'pyproject.toml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Build image
        run: docker build -f docker/Dockerfile -t orchard-ml:ci .
