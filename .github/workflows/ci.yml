name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  # Job 1: Lint and Code Quality
  lint:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Install linting tools
        run: |
          pip install black ruff mypy==1.20.0 types-PyYAML types-requests

      - name: Run Black
        run: black --check --diff .

      - name: Run Ruff
        run: ruff check orchard/ tests/

      - name: Run mypy --strict (type checking)
        run: mypy --strict orchard/

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0

      - name: Check uv.lock in sync with pyproject.toml
        run: uv lock --check

  # Job 2: Pytest Suite
  test-pytest:
    name: Pytest Suite (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14-dev']

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e "."

      - name: Install test dependencies
        run: |
          pip install -e ".[test]"

      - name: Verify orchard is importable
        run: |
          python -c "from orchard.core.metadata import DatasetMetadata; print('✅ orchard imported')"

      - name: Run pytest suite
        run: |
          COV_THRESHOLD=100
          if [[ "${{ matrix.python-version }}" == "3.14-dev" ]]; then
            COV_THRESHOLD=90  # onnxruntime unavailable on 3.14 → export tests skipped
          fi
          pytest tests/ \
            --cov=orchard \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=$COV_THRESHOLD \
            -v \
            --tb=short \
            --maxfail=5

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.10'
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2  # v6.0.0
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-${{ matrix.python-version }}
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: SonarCloud Scan
        if: matrix.python-version == '3.10'
        uses: SonarSource/sonarqube-scan-action@299e4b793aaa83bf2aba7c9c14bedbb485688ec4  # v7.1.0
        continue-on-error: true  # External service — must not block CI on outages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # Job 3: Smoke Tests (classification + detection in parallel)
  test-smoke:
    name: Smoke Test (${{ matrix.task }})
    runs-on: ubuntu-latest
    needs: test-pytest
    strategy:
      fail-fast: false
      matrix:
        include:
          - task: classification
            command: python -m tests.smoke_test --dataset bloodmnist --architecture mini_cnn
            timeout: 10
          - task: detection
            command: python -m tests.smoke_test_detection
            timeout: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run smoke test (${{ matrix.task }})
        run: ${{ matrix.command }}
        timeout-minutes: ${{ matrix.timeout }}

      - name: Upload smoke test artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: smoke-test-${{ matrix.task }}-outputs
          path: outputs/
          retention-days: 7

  # Job 4: Build & Deploy Documentation (main only, after smoke test)
  docs-build:
    name: Build Documentation
    runs-on: ubuntu-latest
    needs: test-smoke
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'
          cache: pip

      - name: Install package with docs dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[docs]"

      - name: Build documentation
        run: mkdocs build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9  # v5.0.0
        with:
          path: site/

  docs-deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: docs-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128  # v5.0.0

  # Job 5: Security Scan
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.10'

      - name: Run Bandit security scan
        run: |
          pip install "bandit[toml]"
          bandit -c pyproject.toml -r orchard/ -l

      - name: Run pip-audit (dependency vulnerability scan)
        # Advisory-only: pip-audit may flag transitive deps outside our control.
        # Failures are logged but must not block CI.
        run: |
          pip install pip-audit
          pip-audit || true
        continue-on-error: true

  # Job 6: Build Status Summary
  build-status:
    name: Build Status
    runs-on: ubuntu-latest
    needs: [lint, test-pytest, test-smoke, docs-deploy, security]
    if: always()
    steps:
      - name: Check build status
        run: |
          echo "Lint: ${{ needs.lint.result }}"
          echo "Pytest: ${{ needs.test-pytest.result }}"
          echo "Smoke Test: ${{ needs.test-smoke.result }}"
          echo "Docs Deploy: ${{ needs.docs-deploy.result }}"
          echo "Security: ${{ needs.security.result }}"

      - name: Fail if critical jobs failed
        if: needs.lint.result == 'failure' || needs.test-pytest.result == 'failure' || needs.test-smoke.result == 'failure' || needs.security.result == 'failure'
        run: exit 1
