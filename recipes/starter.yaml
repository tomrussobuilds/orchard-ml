# yaml-language-server: $schema=
# ==============================================================================
# Orchard ML — Starter Recipe (generated by `orchard init`)
# ==============================================================================
# Usage:   orchard run recipe.yaml
# Docs:    https://github.com/tomrussobuilds/orchard-ml
#
# Edit the values you need. Remove optional sections to disable them.
# Optional sections: tracking, export, optuna
# ==============================================================================

dataset:
    # Dataset identifier (e.g., 'bloodmnist', 'organcmnist')
    name: bloodmnist
    # Root directory for downloaded datasets
    data_root: ./dataset
    # Use class-weighted sampler to handle imbalanced datasets
    use_weighted_sampler: true
    # Maximum samples to load (null = all) (> 0)
    max_samples: null
    # Fraction of max_samples used for val/test splits (0.0–1.0)
    val_ratio: 0.1
    # Convert grayscale to RGB for ImageNet weights
    force_rgb: true
    # Target dataset resolution [28, 32, 64, 128, 224]
    resolution: 28
    # Use memory-mapped loading (lazy) instead of eager RAM loading
    lazy_loading: true

architecture:
    # The unique identifier for the model architecture. E.g., 'efficientnet_b0'.
    name: mini_cnn
    # Whether to initialize the model with pre-trained weights.
    pretrained: false
    # Dropout probability for the classification head. Only wired for mini_cnn
    # and timm_backbone; ignored by convnext_tiny, efficientnet_b0, vit_tiny,
    # resnet_18. (0.0–0.9)
    dropout: 0.2
    # Pretrained weight variant for architectures with multiple options.
    # Examples for ViT-Tiny: 'vit_tiny_patch16_224.augreg_in21k_ft_in1k'
    # (ImageNet-21k → 1k), 'vit_tiny_patch16_224.augreg_in21k' (ImageNet-21k
    # only), 'vit_tiny_patch16_224' (ImageNet-1k baseline). If None, uses
    # default variant for the selected architecture.
    weight_variant: null

training:
    # Random seed
    seed: 42
    # Samples per batch (1–128)
    batch_size: 16
    # Maximum epochs (> 0)
    epochs: 60
    # Early stopping patience (≥ 0)
    patience: 15
    # Progress Bar activation / deactivation
    use_tqdm: true
    # Optimizer algorithm [sgd, adamw]
    optimizer_type: sgd
    # Initial learning rate (1e-08–1.0)
    learning_rate: 0.008
    # Minimum learning rate (1e-08–1.0)
    min_lr: 1.0e-06
    # SGD momentum (0.0–1.0)
    momentum: 0.9
    # L2 regularization (0.0–0.2)
    weight_decay: 0.0005
    # Max gradient norm (0.0–100.0)
    grad_clip: 1.0
    # Label smoothing factor (0.0–0.3)
    label_smoothing: 0.0
    # Mixup coefficient (≥ 0.0)
    mixup_alpha: 0.2
    # Mixup duration (epochs) (≥ 0)
    mixup_epochs: 20
    # Test-time augmentation
    use_tta: true
    # LR scheduler type [cosine, plateau, step, none]
    scheduler_type: cosine
    # Metric for checkpointing and early stopping
    monitor_metric: auc
    # Optimization direction for monitor_metric [maximize, minimize]
    monitor_direction: maximize
    # Plateau patience (≥ 0)
    scheduler_patience: 5
    # LR reduction factor (0.0–1.0)
    scheduler_factor: 0.1
    # StepLR decay period (> 0)
    step_size: 20
    # Automatic Mixed Precision
    use_amp: true
    # Loss function type [cross_entropy, focal]
    criterion_type: cross_entropy
    # Class-frequency weighting
    weighted_loss: false
    # Focal Loss gamma (≥ 0.0)
    focal_gamma: 2.0

augmentation:
    # Horizontal flip probability (0.0–1.0)
    hflip: 0.5
    # Maximum rotation angle (degrees) (0–360)
    rotation_angle: 10
    # Color jitter intensity (≥ 0.0)
    jitter_val: 0.2
    # Minimum random resize scale (0.0–1.0)
    min_scale: 0.9
    # TTA ensemble complexity: 'full' (with rotations) or 'light' (no rotations)
    # [full, light]
    tta_mode: full
    # TTA pixel shift (0.0–50.0)
    tta_translate: 2.0
    # TTA scaling factor (0.0–2.0)
    tta_scale: 1.1
    # TTA Gaussian blur sigma (0.0–5.0)
    tta_blur_sigma: 0.4
    # TTA Gaussian blur kernel size (must be odd) (1–31)
    tta_blur_kernel_size: 3

hardware:
    # Device selection: 'cpu', 'cuda', 'mps', or 'auto' [auto, cpu, cuda, mps]
    device: auto
    # Project identifier for lock file naming
    project_name: orchard_ml
    # Allow terminating duplicate processes for cleanup
    allow_process_kill: true
    # Enable strict deterministic mode
    reproducible: false
    # Warn-only mode for deterministic algorithms (logs warnings
    # instead of crashing on non-deterministic ops)
    deterministic_warn_only: false

telemetry:
    # Root directory for experiment outputs
    output_dir: ./outputs
    # Epoch logging cadence (1–1000)
    log_interval: 10
    # Logging verbosity level [DEBUG, INFO, WARNING, ERROR, CRITICAL]
    log_level: INFO

evaluation:
    # Number of samples in prediction grid (> 0)
    n_samples: 12
    # DPI for saved figures (> 0)
    fig_dpi: 200
    # Confusion matrix colormap
    cmap_confusion: Blues
    # Matplotlib plot style
    plot_style: seaborn-v0_8-muted
    # Prediction grid columns (> 0)
    grid_cols: 4
    # Prediction grid size (width, height)
    fig_size_predictions:
        - 12
        - 8
    # Report export format (xlsx, csv, json)
    report_format: xlsx
    # Save confusion matrix visualization
    save_confusion_matrix: true
    # Save prediction grid visualization
    save_predictions_grid: true

tracking:
    # Enable MLflow tracking
    enabled: true
    # MLflow experiment name
    experiment_name: orchard-ml

export:
    # Export format (only ONNX supported)
    format: onnx
    # ONNX opset version (18=latest, no conversion warnings). Lower versions may
    # trigger fallback. (> 0)
    opset_version: 18
    # Enable dynamic batch size (required for inference)
    dynamic_axes: true
    # Optimize constant operations at export time
    do_constant_folding: true
    # Apply post-training quantization
    quantize: false
    # Weight quantization type (int4/uint4 for edge, int8/uint8 for server)
    # [int8, uint8, int4, uint4]
    quantization_type: int8
    # Quantization backend (qnnpack=mobile, fbgemm=x86) [qnnpack, fbgemm]
    quantization_backend: qnnpack
    # Validate exported model against PyTorch
    validate_export: true
    # Number of samples for validation (> 0)
    validation_samples: 10
    # Maximum allowed output deviation between PyTorch and exported model (>
    # 0.0)
    max_deviation: 0.0001
    # Run ONNX inference latency benchmark after export
    benchmark: false
    # Number of inference runs for latency averaging (> 0)
    benchmark_runs: 100

optuna:
    # Name of the Optuna study
    study_name: orchard_optimization
    # Number of optimization trials to run (> 0)
    n_trials: 50
    # Epochs per trial (shorter than final training) (> 0)
    epochs: 15
    # Max seconds for optimization (None = unlimited) (≥ 0)
    timeout: null
    # Hyperparameter sampling algorithm [tpe, cmaes, random]
    sampler_type: tpe
    # Predefined search space configuration [quick, full]
    search_space_preset: full
    # Include model architecture in search space (resolution-aware: 28px →
    # mini_cnn/resnet_18, 224px → efficientnet_b0/vit_tiny + weight variants)
    enable_model_search: false
    # Restrict model search to a subset of architectures. When None, all built-
    # in models for the target resolution are searched. Requires
    # enable_model_search=True. Minimum 2 entries. Each name must be a valid
    # model factory key or use 'timm/' prefix.
    model_pool: null
    # Stop study when target performance is reached
    enable_early_stopping: true
    # Metric threshold for early stopping (None=auto from monitor_metric)
    # (0.0–1.0)
    early_stopping_threshold: null
    # Consecutive trials meeting threshold before stopping (> 0)
    early_stopping_patience: 2
    # Enable early stopping of unpromising trials
    enable_pruning: true
    # Pruning algorithm for early stopping [median, percentile, hyperband, none]
    pruner_type: median
    # Min epochs before pruning can trigger (≥ 0)
    pruning_warmup_epochs: 5
    # Backend for study persistence [sqlite, memory, postgresql]
    storage_type: sqlite
    # Path to SQLite database (auto-generated if None)
    storage_path: null
    # PostgreSQL connection string (e.g. postgresql://user:pass@host/db)
    postgresql_url: null
    # Parallel trials (1=sequential, -1=all cores)
    n_jobs: 1
    # Resume existing study or create new
    load_if_exists: true
    # Display optimization progress
    show_progress_bar: false
    # Generate and save optimization visualizations
    save_plots: true
    # Export best trial as YAML config
    save_best_config: true
    # Configurable bounds for hyperparameter search ranges
    search_space_overrides:
        # Optimizer algorithms to explore
        optimizer_type:
            - sgd
            - adamw
        learning_rate:
            low: 1.0e-05
            high: 0.01
            log: true
        weight_decay:
            low: 1.0e-06
            high: 0.001
            log: true
        momentum:
            low: 0.85
            high: 0.95
            log: false
        min_lr:
            low: 1.0e-07
            high: 1.0e-05
            log: true
        # Loss function types to explore
        criterion_type:
            - cross_entropy
            - focal
        focal_gamma:
            low: 0.5
            high: 5.0
            log: false
        mixup_alpha:
            low: 0.0
            high: 0.4
            log: false
        label_smoothing:
            low: 0.0
            high: 0.2
            log: false
        dropout:
            low: 0.1
            high: 0.5
            log: false
        # Scheduler types to explore
        scheduler_type:
            - cosine
            - plateau
            - step
        scheduler_patience:
            low: 3
            high: 10
        rotation_angle:
            low: 0
            high: 15
        jitter_val:
            low: 0.0
            high: 0.15
            log: false
        min_scale:
            low: 0.9
            high: 1.0
            log: false
        batch_size_low_res:
            - 16
            - 32
            - 48
            - 64
        batch_size_high_res:
            - 8
            - 12
            - 16

