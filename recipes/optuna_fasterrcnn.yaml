# ==============================================================================
# FILE: recipes/optuna_fasterrcnn.yaml
# Faster R-CNN Optuna Hyperparameter Search
# ==============================================================================
# Usage: orchard run recipes/optuna_fasterrcnn.yaml
# Search space: learning_rate, weight_decay, momentum, batch_size, dropout,
#   scheduler, jitter. Classification-only params (criterion, focal_gamma,
#   label_smoothing, mixup_alpha) and model search are auto-excluded.

task_type: detection

dataset:
  name: "pennfudan"
  data_root: ./dataset
  resolution: 224
  force_rgb: true
  use_weighted_sampler: false

architecture:
  name: "fasterrcnn"
  pretrained: true

training:
  seed: 42
  batch_size: 4
  learning_rate: 0.005
  weight_decay: 0.0005
  momentum: 0.9
  min_lr: 1e-7
  optimizer_type: "sgd"

  mixup_alpha: 0.0
  label_smoothing: 0.0

  epochs: 15
  patience: 5
  grad_clip: 1.0
  mixup_epochs: 0

  monitor_metric: "map"
  monitor_direction: "maximize"
  scheduler_type: "cosine"
  scheduler_patience: 3

  use_amp: true
  use_tta: false

augmentation:
  hflip: 0.0
  rotation_angle: 0
  jitter_val: 0.2
  min_scale: 1.0

hardware:
  device: "auto"
  reproducible: false

telemetry:
  output_dir: ./outputs
  log_level: "INFO"
  log_interval: 50

evaluation:
  fig_dpi: 200
  save_confusion_matrix: false
  save_predictions_grid: false

optuna:
  n_trials: 20
  search_space_preset: "full"
  enable_model_search: false
  search_space_overrides:
    batch_size_high_res: [2, 4, 6]
